// ── PKCE / OAuth ──────────────────────────────────────────────────────────────
async function genPKCE(){
  const v=Array.from(crypto.getRandomValues(new Uint8Array(32)),b=>b.toString(16).padStart(2,'0')).join('');
  const digest=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  const c=btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  return {verifier:v,challenge:c};
}
function genState(){return Array.from(crypto.getRandomValues(new Uint8Array(8)),b=>b.toString(16).padStart(2,'0')).join('');}
function redirectUri(){return window.location.origin+window.location.pathname;}

async function startOAuth(platform,clientId){
  const state=genState(), ru=redirectUri();
  sessionStorage.setItem('mulib_platform',platform);
  sessionStorage.setItem('mulib_state',state);
  sessionStorage.setItem('mulib_clientid',clientId);
  let url;
  if(platform==='spotify'){
    const {verifier,challenge}=await genPKCE();
    sessionStorage.setItem('mulib_verifier',verifier);
    url='https://accounts.spotify.com/authorize?'+new URLSearchParams({client_id:clientId,response_type:'code',redirect_uri:ru,scope:'user-library-read',state,code_challenge_method:'S256',code_challenge:challenge});
  } else if(platform==='youtube'){
    const {verifier,challenge}=await genPKCE();
    sessionStorage.setItem('mulib_verifier',verifier);
    url='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({client_id:clientId,response_type:'code',redirect_uri:ru,scope:'https://www.googleapis.com/auth/youtube.readonly',state,code_challenge_method:'S256',code_challenge:challenge,access_type:'online'});
  } else if(platform==='soundcloud'){
    const secret=sessionStorage.getItem('mulib_soundcloud_secret')||'';
    if(!secret){alert('Enter your SoundCloud client secret.');return;}
    url='https://soundcloud.com/connect?'+new URLSearchParams({client_id:clientId,redirect_uri:ru,response_type:'code',scope:'non-expiring',state});
  } else if(platform==='tidal'){
    const {verifier,challenge}=await genPKCE();
    sessionStorage.setItem('mulib_verifier',verifier);
    url='https://login.tidal.com/authorize?'+new URLSearchParams({client_id:clientId,response_type:'code',redirect_uri:ru,scope:'r_usr+w_usr',state,code_challenge_method:'S256',code_challenge:challenge});
  }
  window.location.href=url;
}

async function exchangeToken(platform,code,clientId){
  const ru=redirectUri(), verifier=sessionStorage.getItem('mulib_verifier');
  const urls={
    spotify:    'https://accounts.spotify.com/api/token',
    youtube:    'https://oauth2.googleapis.com/token',
    tidal:      'https://auth.tidal.com/v1/oauth2/token',
    soundcloud: 'https://api.soundcloud.com/oauth2/token',
  };
  const body=platform==='soundcloud'
    ? new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:ru,client_id:clientId,client_secret:sessionStorage.getItem('mulib_soundcloud_secret')||''})
    : new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:ru,client_id:clientId,code_verifier:verifier});
  const r=await fetch(urls[platform],{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok){const txt=await r.text();throw new Error(`Token exchange failed (${r.status}): ${txt}`);}
  return r.json();
}

// ── Platform fetchers ─────────────────────────────────────────────────────────
const ms2t=ms=>{if(!ms)return'—';const s=Math.floor(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};

async function fetchSpotify(token){
  let url='https://api.spotify.com/v1/me/tracks?limit=50',all=[];
  while(url&&all.length<2000){
    const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok)throw new Error(`Spotify ${r.status}`);
    const d=await r.json();
    all=[...all,...(d.items||[]).map(({track:tr})=>({id:`spt-${tr.id}`,title:tr.name,artist:tr.artists.map(a=>a.name).join(', '),album:tr.album.name,genre:'Unknown',platform:'spotify',duration:ms2t(tr.duration_ms)}))];
    url=d.next;
  }
  return all;
}
async function fetchYouTube(token){
  let pt='',all=[];
  do{
    const p=new URLSearchParams({part:'snippet',myRating:'like',maxResults:50,...(pt&&{pageToken:pt})});
    const r=await fetch(`https://www.googleapis.com/youtube/v3/videos?${p}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok)throw new Error(`YouTube ${r.status}`);
    const d=await r.json();
    all=[...all,...(d.items||[]).map(i=>({id:`ytm-${i.id}`,title:i.snippet.title,artist:i.snippet.channelTitle,album:'YouTube',genre:'Unknown',platform:'youtube',duration:'—'}))];
    pt=d.nextPageToken||'';
  }while(pt&&all.length<2000);
  return all;
}
async function fetchSoundCloud(token){
  const r=await fetch('https://api.soundcloud.com/me/likes/tracks?limit=200',{headers:{Authorization:`OAuth ${token}`}});
  if(!r.ok)throw new Error(`SoundCloud ${r.status}`);
  const d=await r.json();
  return(Array.isArray(d)?d:d.collection||[]).map(t=>({id:`snd-${t.id}`,title:t.title,artist:t.user?.username||'Unknown',album:'SoundCloud',genre:t.genre||'Unknown',platform:'soundcloud',duration:ms2t(t.duration)}));
}
async function fetchTidal(token){
  const r=await fetch('https://openapi.tidal.com/v2/my-collection/tracks?limit=50&countryCode=US',{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.api+json'}});
  if(!r.ok)throw new Error(`Tidal ${r.status}`);
  const d=await r.json();
  return(d.data||[]).map(i=>({id:`tdl-${i.id}`,title:i.attributes?.title||'Unknown',artist:'Unknown',album:'Unknown',genre:'Unknown',platform:'tidal',duration:'—'}));
}

// ── Last.fm helpers ───────────────────────────────────────────────────────────
const lfmBase='https://ws.audioscrobbler.com/2.0/';
async function lfmGet(params){
  const r=await fetch(lfmBase+'?'+new URLSearchParams({format:'json',...params}));
  if(!r.ok)throw new Error(`Last.fm HTTP ${r.status}`);
  const d=await r.json();
  if(d.error)throw new Error(`Last.fm error ${d.error}: ${d.message}`);
  return d;
}
async function fetchLfmUser(apiKey,username){
  const d=await lfmGet({method:'user.getinfo',user:username,api_key:apiKey});
  const u=d.user;
  return{name:u.name,realname:u.realname||'',image:u.image?.find(i=>i.size==='large')?.['#text']||'',playcount:parseInt(u.playcount||0),registered:parseInt(u.registered?.unixtime||0),country:u.country||''};
}
async function fetchLfmLoved(apiKey,username){
  let page=1,all=[];
  while(page<=20){
    const d=await lfmGet({method:'user.getlovedtracks',user:username,api_key:apiKey,limit:200,page});
    const tracks=d.lovedtracks?.track||[];
    if(!Array.isArray(tracks)||!tracks.length)break;
    all=[...all,...tracks.map((tr,i)=>({id:`lfm-${page}-${i}`,title:tr.name,artist:tr.artist?.name||'Unknown',album:'Unknown Album',genre:'Unknown',platform:'lastfm',duration:'—'}))];
    if(all.length>=parseInt(d.lovedtracks?.['@attr']?.total||0))break;
    page++;
  }
  return all;
}
async function fetchLfmRecent(apiKey,username,onProgress){
  const from=Math.floor((Date.now()-90*D)/1000);
  let page=1,all=[],totalPages=null;
  while(true){
    const d=await lfmGet({method:'user.getrecenttracks',user:username,api_key:apiKey,limit:200,from,page,extended:0});
    const tracks=(d.recenttracks?.track||[]).filter(t=>!t['@attr']?.nowplaying);
    if(!tracks.length)break;
    if(totalPages===null)totalPages=parseInt(d.recenttracks?.['@attr']?.totalPages||1);
    all=[...all,...tracks.map(tr=>({
      title:tr.name,
      artist:tr.artist?.['#text']||'Unknown',
      album:tr.album?.['#text']||'Unknown',
      ts:parseInt(tr.date?.uts||0)*1000,
      image:tr.image?.find(i=>i.size==='medium')?.['#text']||'',
    }))];
    if(onProgress)onProgress(all.length);
    if(page>=totalPages||page>=50)break;
    page++;
  }
  return all;
}
async function fetchLfmTops(apiKey,username,period){
  const [tr,ar,al]=await Promise.all([
    lfmGet({method:'user.gettoptracks', user:username,api_key:apiKey,period,limit:50}),
    lfmGet({method:'user.gettopartists',user:username,api_key:apiKey,period,limit:50}),
    lfmGet({method:'user.gettopalbums', user:username,api_key:apiKey,period,limit:50}),
  ]);
  return{
    tracks: (tr.toptracks?.track||[]).map(x=>({name:x.name,artist:x.artist?.name||'',plays:parseInt(x.playcount||0),image:x.image?.find(i=>i.size==='medium')?.['#text']||''})),
    artists:(ar.topartists?.artist||[]).map(x=>({name:x.name,plays:parseInt(x.playcount||0),image:x.image?.find(i=>i.size==='medium')?.['#text']||''})),
    albums: (al.topalbums?.album||[]).map(x=>({name:x.name,artist:x.artist?.name||'',plays:parseInt(x.playcount||0),image:x.image?.find(i=>i.size==='medium')?.['#text']||''})),
  };
}

// ── Scrobble → library dedup ──────────────────────────────────────────────────
function scrobblesToLibrary(recent,lovedSongs){
  const lovedSet=new Set(lovedSongs.map(s=>`${s.title}|||${s.artist}`.toLowerCase()));
  const countMap={};
  recent.forEach(s=>{const k=`${s.title}|||${s.artist}`.toLowerCase();countMap[k]=(countMap[k]||0)+1;});
  const seen=new Set();
  const out=[];
  recent.forEach(s=>{
    const k=`${s.title}|||${s.artist}`.toLowerCase();
    if(!seen.has(k)&&!lovedSet.has(k)){
      seen.add(k);
      out.push({id:`scr-${out.length}`,title:s.title,artist:s.artist,album:s.album||'Unknown',genre:'Unknown',platform:'scrobble',duration:'—',plays:countMap[k]});
    }
  });
  return out;
}

// ── Misc helpers ──────────────────────────────────────────────────────────────
const getSaved=(k,def)=>{try{const v=sessionStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}};
const setSaved=(k,v)=>{try{sessionStorage.setItem(k,JSON.stringify(v));}catch{}};
const fmtTs=ts=>{const diff=NOW-ts,m=Math.floor(diff/60000),h=Math.floor(diff/H),dy=Math.floor(diff/D);return m<60?`${m}m ago`:h<24?`${h}h ago`:dy<7?`${dy}d ago`:new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});};
const fmtDate=ts=>new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const dayKey=ts=>{const d=new Date(ts);d.setHours(0,0,0,0);return d.getTime();};
const fmtN=n=>n>=1000000?`${(n/1000000).toFixed(1)}M`:n>=1000?`${(n/1000).toFixed(1)}K`:String(n);

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [dark,setDark]           = useState(()=>getSaved('mulib_dark',true));
  const [view,setView]           = useState('library');
  const [search,setSearch]       = useState('');
  const [groupBy,setGroupBy]     = useState('none');
  const [filterP,setFilterP]     = useState('all');
  const [showConn,setShowConn]   = useState(false);
  const [songs,setSongs]         = useState(()=>getSaved('mulib_songs',[]));
  const [tokens,setTokens]       = useState(()=>getSaved('mulib_tokens',{}));
  const [creds,setCreds]         = useState(()=>getSaved('mulib_creds',{}));
  const [cbStatus,setCbStatus]   = useState(null);
  const [hRange,setHRange]       = useState('7d');
  const [lfmUserData,setLfmUserData]   = useState(()=>getSaved('mulib_lfm_user',null));
  const [lfmRecent,setLfmRecent]       = useState(()=>getSaved('mulib_lfm_recent',[]));
  const [lfmTops,setLfmTops]           = useState(()=>getSaved('mulib_lfm_tops',{}));
  const [lfmPeriod,setLfmPeriod]       = useState('overall');
  const [lfmSubView,setLfmSubView]     = useState('overview');
  const [lfmFetching,setLfmFetching]   = useState(false);

  const t=T[dark?'dark':'light'];
  const connected=Object.keys(tokens).filter(k=>tokens[k]);
  const allSongs=songs.length?songs:DEMO;
  const isDemo=!songs.length;
  const lfmCreds=creds.lastfm?{apiKey:creds.lastfm,username:getSaved('mulib_lfmuser','')}:null;

  useEffect(()=>setSaved('mulib_dark',dark),[dark]);
  useEffect(()=>setSaved('mulib_songs',songs),[songs]);
  useEffect(()=>setSaved('mulib_tokens',tokens),[tokens]);
  useEffect(()=>setSaved('mulib_creds',creds),[creds]);
  useEffect(()=>setSaved('mulib_lfm_user',lfmUserData),[lfmUserData]);
  useEffect(()=>setSaved('mulib_lfm_recent',lfmRecent),[lfmRecent]);
  useEffect(()=>setSaved('mulib_lfm_tops',lfmTops),[lfmTops]);

  // ── OAuth callback ──────────────────────────────────────────────────────────
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const code=params.get('code'),state=params.get('state'),error=params.get('error');
    const sp=sessionStorage.getItem('mulib_platform');
    const ss=sessionStorage.getItem('mulib_state');
    const sc=sessionStorage.getItem('mulib_clientid');
    const clear=()=>['mulib_platform','mulib_state','mulib_clientid','mulib_verifier'].forEach(k=>sessionStorage.removeItem(k));
    if(error){setCbStatus({status:'error',msg:`OAuth denied: ${error}`});clear();window.history.replaceState({},document.title,window.location.pathname);return;}
    if(code&&sp&&state===ss){
      window.history.replaceState({},document.title,window.location.pathname);
      setCbStatus({status:'loading',msg:`Connecting ${PLATFORMS[sp]?.name}...`});
      exchangeToken(sp,code,sc)
        .then(td=>{
          if(!td.access_token)throw new Error(JSON.stringify(td));
          const tk=td.access_token;
          setTokens(prev=>{const n={...prev,[sp]:tk};setSaved('mulib_tokens',n);return n;});
          clear();
          setCbStatus({status:'loading',msg:`Fetching tracks from ${PLATFORMS[sp]?.name}...`});
          const fetchers={spotify:fetchSpotify,youtube:fetchYouTube,soundcloud:fetchSoundCloud,tidal:fetchTidal};
          return fetchers[sp]?.(tk);
        })
        .then(newSongs=>{
          setSongs(prev=>{const f=prev.filter(s=>s.platform!==sp);const n=[...f,...newSongs];setSaved('mulib_songs',n);return n;});
          setCbStatus({status:'success',msg:`✓ Loaded ${newSongs.length} tracks from ${PLATFORMS[sp]?.name}`});
        })
        .catch(e=>setCbStatus({status:'error',msg:e.message}));
    }
  },[]);

  // ── Last.fm full connect ────────────────────────────────────────────────────
  const handleLastfm=useCallback(async(apiKey,username)=>{
    setLfmFetching(true);
    try{
      setCbStatus({status:'loading',msg:'Fetching Last.fm profile...'});
      const userInfo=await fetchLfmUser(apiKey,username);
      setLfmUserData(userInfo);

      setCbStatus({status:'loading',msg:'Fetching loved tracks...'});
      const loved=await fetchLfmLoved(apiKey,username);

      setCbStatus({status:'loading',msg:'Fetching 90-day scrobble history...'});
      const recent=await fetchLfmRecent(apiKey,username,done=>{
        setCbStatus({status:'loading',msg:`Fetching scrobbles... ${done} loaded`});
      });
      setLfmRecent(recent);

      // Build scrobble library entries (unique, excluding loved)
      const scrobbled=scrobblesToLibrary(recent,loved);

      // Merge loved + scrobbled into songs
      setSongs(prev=>{
        const others=prev.filter(s=>s.platform!=='lastfm'&&s.platform!=='scrobble');
        const merged=[...others,...loved,...scrobbled];
        setSaved('mulib_songs',merged);
        return merged;
      });

      setCbStatus({status:'loading',msg:'Fetching top tracks, artists & albums...'});
      const tops=await fetchLfmTops(apiKey,username,'overall');
      setLfmTops({overall:tops});

      setLfmFetching(false);
      setCbStatus({status:'success',msg:`✓ Last.fm connected — ${fmtN(userInfo.playcount)} total scrobbles · ${loved.length} loved tracks · ${scrobbled.length} unique scrobbled tracks`});
      setView('lastfm');
    }catch(e){
      setLfmFetching(false);
      setCbStatus({status:'error',msg:`Last.fm: ${e.message}`});
    }
  },[]);

  // ── Lazy-load tops by period ────────────────────────────────────────────────
  const handlePeriodChange=useCallback(async(period)=>{
    setLfmPeriod(period);
    if(lfmTops[period]||!lfmCreds)return;
    try{
      const tops=await fetchLfmTops(lfmCreds.apiKey,lfmCreds.username,period);
      setLfmTops(prev=>({...prev,[period]:tops}));
    }catch(e){console.error('Tops fetch:',e);}
  },[lfmTops,lfmCreds]);

  // ── Library filters ─────────────────────────────────────────────────────────
  const filtered=useMemo(()=>allSongs.filter(s=>{
    const q=search.toLowerCase();
    return(!q||[s.title,s.artist,s.album,s.genre].some(f=>f.toLowerCase().includes(q)))
        &&(filterP==='all'||s.platform===filterP);
  }),[allSongs,search,filterP]);

  const grouped=useMemo(()=>{
    if(groupBy==='none')return null;
    const g={};
    filtered.forEach(s=>{const k=s[groupBy];if(!g[k])g[k]=[];g[k].push(s);});
    return Object.entries(g).sort(([a],[b])=>a.localeCompare(b));
  },[filtered,groupBy]);

  const pCounts=useMemo(()=>{const c={};allSongs.forEach(s=>{c[s.platform]=(c[s.platform]||0)+1;});return c;},[allSongs]);

  // ── History ─────────────────────────────────────────────────────────────────
  const useRealHist=lfmRecent.length>0;
  const cutoff=useMemo(()=>{const m={'24h':H*24,'7d':D*7,'30d':D*30,'90d':D*90,'all':Infinity};return NOW-(m[hRange]||D*7);},[hRange]);
  const histF=useMemo(()=>{
    const src=useRealHist
      ? lfmRecent.map((s,i)=>({id:i,track:s.title,artist:s.artist,album:s.album,ts:s.ts,image:s.image}))
      : DEMO_HIST;
    return src.filter(h=>h.ts>=cutoff);
  },[useRealHist,lfmRecent,cutoff]);
  const histByDay=useMemo(()=>{const g={};histF.forEach(h=>{const k=dayKey(h.ts);if(!g[k])g[k]=[];g[k].push(h);});return Object.entries(g).sort(([a],[b])=>Number(b)-Number(a));},[histF]);
  const ppd=useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);d.setHours(0,0,0,0);
    const day=d.getTime();
    const src=useRealHist?lfmRecent.map((s,i)=>({ts:s.ts})):DEMO_HIST;
    return{day,count:src.filter(h=>dayKey(h.ts)===day).length};
  }),[useRealHist,lfmRecent]);
  const maxP=Math.max(...ppd.map(d=>d.count),1);

  // ── Shared styles ───────────────────────────────────────────────────────────
  const pb=(active,ac)=>({background:active?(ac||t.pa):'transparent',color:active?(ac?'#fff':t.pat):t.mu,border:`2px solid ${active?(ac||t.bs):t.b}`,padding:'5px 12px',fontSize:11,fontWeight:700,letterSpacing:1,cursor:'pointer',textTransform:'uppercase',fontFamily:'inherit',boxShadow:active?t.sh:'none',transition:'all .1s'});
  const nt=(active)=>({background:'none',border:'none',borderBottom:active?`3px solid ${t.tx}`:'3px solid transparent',color:active?t.tx:t.mu,fontWeight:700,fontSize:12,letterSpacing:2,padding:'0 4px',cursor:'pointer',fontFamily:'inherit',textTransform:'uppercase',height:'100%'});

  return(
    <div style={{fontFamily:"'Space Grotesk','IBM Plex Mono','Courier New',monospace",background:t.bg,color:t.tx,minHeight:'100vh',transition:'background .2s,color .2s'}}>

      {/* NAV */}
      <div style={{borderBottom:`3px solid ${t.bs}`,background:t.sf,padding:'0 24px'}}>
        <div style={{maxWidth:960,margin:'0 auto',display:'flex',alignItems:'center',gap:20,height:56}}>
          <span style={{fontWeight:900,fontSize:16,letterSpacing:3,textTransform:'uppercase'}}>MULIB</span>
          <span style={{color:t.b,fontSize:20}}>|</span>
          <button style={nt(view==='library')} onClick={()=>setView('library')}>LIBRARY</button>
          <button style={nt(view==='history')} onClick={()=>setView('history')}>HISTORY</button>
          <button style={nt(view==='lastfm')}  onClick={()=>setView('lastfm')}>LAST.FM{lfmUserData?' ✓':''}</button>
          <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
            {isDemo&&<span style={{fontSize:10,color:t.mu,letterSpacing:1,fontWeight:700}}>DEMO</span>}
            {connected.filter(k=>k!=='lastfm').map(k=>(
              <span key={k} style={{fontSize:10,fontWeight:900,color:PLATFORMS[k].color,border:`1px solid ${PLATFORMS[k].color}`,padding:'2px 6px',letterSpacing:1}}>{PLATFORMS[k].short} ✓</span>
            ))}
            <button onClick={()=>setDark(d=>!d)} style={{...pb(false),padding:'5px 10px'}}>{dark?'☀ LIGHT':'● DARK'}</button>
            <button onClick={()=>setShowConn(true)} style={{background:t.tx,color:t.bg,border:`2px solid ${t.bs}`,padding:'5px 14px',fontSize:11,fontWeight:900,letterSpacing:1,cursor:'pointer',fontFamily:'inherit',textTransform:'uppercase',boxShadow:t.sh}}>+ CONNECT</button>
          </div>
        </div>
      </div>

      {/* Status banner */}
      {cbStatus&&(
        <div style={{background:cbStatus.status==='success'?'#1DB95422':cbStatus.status==='error'?'#ef444422':'#ffffff11',borderBottom:`2px solid ${cbStatus.status==='success'?'#1DB954':cbStatus.status==='error'?'#ef4444':t.b}`,padding:'10px 24px',fontSize:12,fontWeight:700,letterSpacing:1,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:cbStatus.status==='success'?'#1DB954':cbStatus.status==='error'?'#ef4444':t.mu}}>{cbStatus.msg}</span>
          {cbStatus.status!=='loading'&&<button onClick={()=>setCbStatus(null)} style={{background:'none',border:'none',color:t.mu,cursor:'pointer',fontSize:14}}>✕</button>}
        </div>
      )}

      <div style={{maxWidth:960,margin:'0 auto',padding:'28px 24px'}}>

        {/* ══ LIBRARY ══ */}
        {view==='library'&&(<>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
            {[{l:'SONGS',v:filtered.length},{l:'ARTISTS',v:new Set(filtered.map(s=>s.artist)).size},{l:'ALBUMS',v:new Set(filtered.map(s=>s.album)).size},{l:'GENRES',v:new Set(filtered.map(s=>s.genre)).size}].map(s=>(
              <div key={s.l} style={{border:`2px solid ${t.b}`,background:t.sf,padding:'14px 16px',boxShadow:t.sh}}>
                <div style={{fontSize:28,fontWeight:900,lineHeight:1}}>{s.v}</div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:t.mu,marginTop:4}}>{s.l}</div>
              </div>
            ))}
          </div>

          {/* Platform pills — hide youtube/soundcloud/tidal if they have 0 real songs */}
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
            {[['all','ALL'],...Object.entries(PLATFORMS).map(([k,v])=>[k,v.short])].map(([key,lbl])=>{
              const cnt=key==='all'?allSongs.length:(pCounts[key]||0);
              if(key!=='all'&&cnt===0)return null;
              return(
                <button key={key} onClick={()=>setFilterP(key)} style={pb(filterP===key,key!=='all'?PLATFORMS[key]?.color:null)}>
                  {lbl} ({cnt})
                </button>
              );
            })}
          </div>

          <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tracks, artists, albums..." style={{flex:1,minWidth:200,background:t.ib,border:`2px solid ${t.b}`,padding:'10px 14px',color:t.tx,fontSize:12,fontWeight:600,outline:'none',fontFamily:'inherit'}}/>
            <div style={{display:'flex',border:`2px solid ${t.b}`}}>
              {[['none','ALL'],['artist','ARTIST'],['album','ALBUM'],['genre','GENRE']].map(([val,lbl],i)=>(
                <button key={val} onClick={()=>setGroupBy(val)} style={{...pb(groupBy===val),border:'none',borderLeft:i>0?`2px solid ${t.b}`:'none',boxShadow:'none'}}>{lbl}</button>
              ))}
            </div>
          </div>

          {filtered.length===0
            ?<Empty t={t} msg="NO RESULTS FOUND"/>
            :grouped
              ?grouped.map(([grp,gs])=><GroupSection key={grp} title={grp} songs={gs} t={t}/>)
              :filtered.map((s,i)=><SongRow key={s.id} song={s} t={t} index={i}/>)
          }
        </>)}

        {/* ══ HISTORY ══ */}
        {view==='history'&&(<>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24,flexWrap:'wrap'}}>
            <span style={{fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu}}>RANGE</span>
            <div style={{display:'flex',border:`2px solid ${t.b}`}}>
              {[['24h','24H'],['7d','7D'],['30d','30D'],...(useRealHist?[['90d','90D']]:[]],['all','ALL']].map(([val,lbl],i)=>(
                <button key={val} onClick={()=>setHRange(val)} style={{...pb(hRange===val),border:'none',borderLeft:i>0?`2px solid ${t.b}`:'none',boxShadow:'none'}}>{lbl}</button>
              ))}
            </div>
            {useRealHist&&<span style={{fontSize:10,color:LFM_COLOR,fontWeight:700,letterSpacing:1}}>LFM ✓ REAL DATA</span>}
            <span style={{marginLeft:'auto',fontSize:11,color:t.mu,fontWeight:700}}>{histF.length} PLAYS</span>
          </div>

          <div style={{border:`2px solid ${t.b}`,background:t.sf,padding:20,marginBottom:20,boxShadow:t.sh}}>
            <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu,marginBottom:16}}>PLAYS — LAST 7 DAYS</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:8,height:80}}>
              {ppd.map(({day,count})=>{
                const h=count===0?4:Math.max(8,Math.round((count/maxP)*80));
                const isToday=dayKey(NOW)===day;
                return(
                  <div key={day} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                    <span style={{fontSize:9,fontWeight:700,color:t.mu}}>{count||''}</span>
                    <div style={{width:'100%',height:h,background:isToday?t.tx:t.bar,border:`1px solid ${t.b}`}}/>
                    <span style={{fontSize:9,fontWeight:700,color:isToday?t.tx:t.mu}}>{new Date(day).toLocaleDateString('en-US',{weekday:'short'}).toUpperCase()}</span>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{border:`2px solid ${t.b}`,background:t.sf,boxShadow:t.sh}}>
            <div style={{borderBottom:`2px solid ${t.b}`,padding:'12px 16px',fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu}}>RECENT PLAYS</div>
            {histByDay.length===0
              ?<Empty t={t} msg="NO PLAYS IN RANGE"/>
              :histByDay.map(([day,plays])=>(
                <div key={day}>
                  <div style={{padding:'8px 16px',background:t.ab,borderBottom:`1px solid ${t.b}`,fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu}}>
                    {fmtDate(Number(day)).toUpperCase()} — {plays.length} PLAYS
                  </div>
                  {plays.map((h,i)=>(
                    <div key={h.id??i} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 16px',borderBottom:`1px solid ${t.b}`,transition:'background .1s'}}
                      onMouseEnter={e=>e.currentTarget.style.background=t.ab}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{fontSize:10,color:t.mu,minWidth:52,fontWeight:700}}>{fmtTs(h.ts)}</span>
                      {h.image&&<img src={h.image} alt="" style={{width:42,height:42,objectFit:'cover',border:`1px solid ${t.b}`,flexShrink:0}} onError={e=>e.target.style.display='none'}/>}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{h.track}</div>
                        <div style={{fontSize:11,color:t.mu,marginTop:1}}>{h.artist}{h.album&&h.album!=='Unknown'?` — ${h.album}`:''}</div>
                      </div>
                      <span style={{fontSize:10,fontWeight:900,letterSpacing:1,color:LFM_COLOR,border:`2px solid ${LFM_COLOR}`,padding:'2px 6px',flexShrink:0}}>{useRealHist?'LFM':'DEMO'}</span>
                    </div>
                  ))}
                </div>
              ))
            }
          </div>
        </>)}

        {/* ══ LAST.FM ══ */}
        {view==='lastfm'&&(
          <LastfmView
            user={lfmUserData} recent={lfmRecent} tops={lfmTops}
            period={lfmPeriod} onPeriod={handlePeriodChange}
            subView={lfmSubView} setSubView={setLfmSubView}
            t={t} pb={pb} dark={dark}
            notConnected={!lfmUserData}
            onConnect={()=>setShowConn(true)}
          />
        )}
      </div>

      {showConn&&<ConnectModal onClose={()=>setShowConn(false)} t={t} dark={dark} creds={creds} setCreds={setCreds} onOAuth={startOAuth} onLastfm={handleLastfm}/>}
    </div>
  );
}

// ── Last.fm Dashboard ─────────────────────────────────────────────────────────
function LastfmView({user,recent,tops,period,onPeriod,subView,setSubView,t,pb,dark,notConnected,onConnect}){
  if(notConnected)return(
    <div style={{border:`2px solid ${t.b}`,padding:'60px 0',textAlign:'center'}}>
      <div style={{fontSize:32,marginBottom:12}}>◉</div>
      <div style={{fontWeight:900,letterSpacing:2,marginBottom:8}}>LAST.FM NOT CONNECTED</div>
      <div style={{color:t.mu,fontSize:12,marginBottom:20}}>Connect your Last.fm account to see your full listening stats.</div>
      <button onClick={onConnect} style={{background:LFM_COLOR,border:`2px solid ${LFM_COLOR}`,color:'#fff',fontWeight:900,fontSize:12,letterSpacing:2,padding:'10px 20px',cursor:'pointer',fontFamily:'inherit'}}>CONNECT LAST.FM</button>
    </div>
  );

  const curTops=tops[period]||{tracks:[],artists:[],albums:[]};

  const playsPerDay=useMemo(()=>{
    const last30=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);d.setHours(0,0,0,0);return d.getTime();});
    const counts={};recent.forEach(s=>{const k=dayKey(s.ts);counts[k]=(counts[k]||0)+1;});
    return last30.map(day=>({day,count:counts[day]||0}));
  },[recent]);
  const maxD=Math.max(...playsPerDay.map(d=>d.count),1);

  const sub=(val,lbl)=>(
    <button onClick={()=>setSubView(val)} style={{background:'none',border:'none',borderBottom:subView===val?`2px solid ${LFM_COLOR}`:'2px solid transparent',color:subView===val?t.tx:t.mu,fontWeight:700,fontSize:11,letterSpacing:1,padding:'10px 12px',cursor:'pointer',fontFamily:'inherit',textTransform:'uppercase'}}>
      {lbl}
    </button>
  );

  return(<>
    {/* User card */}
    <div style={{border:`2px solid ${t.b}`,background:t.sf,padding:20,marginBottom:20,boxShadow:t.sh,display:'flex',gap:20,alignItems:'center',flexWrap:'wrap'}}>
      {user.image&&<img src={user.image} alt={user.name} style={{width:72,height:72,border:`2px solid ${LFM_COLOR}`,objectFit:'cover',flexShrink:0}} onError={e=>e.target.style.display='none'}/>}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:900,fontSize:20,letterSpacing:1}}>{user.name}</div>
        {user.realname&&<div style={{color:t.mu,fontSize:12,marginTop:2}}>{user.realname}</div>}
        <div style={{display:'flex',gap:16,marginTop:8,flexWrap:'wrap'}}>
          <span style={{fontSize:11,color:t.mu}}><b style={{color:t.tx}}>{fmtN(user.playcount)}</b> SCROBBLES</span>
          {user.country&&<span style={{fontSize:11,color:t.mu}}>{user.country}</span>}
          {user.registered&&<span style={{fontSize:11,color:t.mu}}>SINCE {new Date(user.registered*1000).getFullYear()}</span>}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,minWidth:220}}>
        {[{l:'90D PLAYS',v:recent.length},{l:'TOP TRACK',v:curTops.tracks[0]?.name||'—'},{l:'TOP ARTIST',v:curTops.artists[0]?.name||'—'}].map(s=>(
          <div key={s.l} style={{border:`1px solid ${t.b}`,padding:'8px 10px',textAlign:'center'}}>
            <div style={{fontSize:13,fontWeight:900,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',color:LFM_COLOR}}>{s.v}</div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:1,color:t.mu,marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Period selector */}
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4,flexWrap:'wrap'}}>
      <span style={{fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu}}>PERIOD</span>
      <div style={{display:'flex',border:`2px solid ${t.b}`}}>
        {PERIODS.map(({val,label},i)=>(
          <button key={val} onClick={()=>onPeriod(val)} style={{...pb(period===val,LFM_COLOR),border:'none',borderLeft:i>0?`2px solid ${t.b}`:'none',boxShadow:'none'}}>{label}</button>
        ))}
      </div>
    </div>

    {/* Sub-nav */}
    <div style={{display:'flex',borderBottom:`2px solid ${t.b}`,marginBottom:20}}>
      {sub('overview','OVERVIEW')}{sub('tracks','TOP TRACKS')}{sub('artists','TOP ARTISTS')}{sub('albums','TOP ALBUMS')}{sub('scrobbles','SCROBBLES')}
    </div>

    {subView==='overview'&&(<>
      <div style={{border:`2px solid ${t.b}`,background:t.sf,padding:20,marginBottom:16,boxShadow:t.sh}}>
        <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu,marginBottom:12}}>PLAYS — LAST 30 DAYS</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:2,height:60}}>
          {playsPerDay.map(({day,count})=>{
            const h=count===0?2:Math.max(4,Math.round((count/maxD)*60));
            const isToday=dayKey(NOW)===day;
            return(<div key={day} title={`${fmtDate(day)}: ${count}`} style={{flex:1,height:h,background:isToday?LFM_COLOR:t.bar,border:`1px solid ${isToday?LFM_COLOR:t.b}`,cursor:'default'}}/>);
          })}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
          <span style={{fontSize:9,color:t.mu}}>{fmtDate(playsPerDay[0]?.day||NOW)}</span>
          <span style={{fontSize:9,color:t.mu}}>TODAY</span>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {[{title:'TOP TRACKS',items:curTops.tracks.slice(0,5),nameKey:'name',sub:'artist'},{title:'TOP ARTISTS',items:curTops.artists.slice(0,5),nameKey:'name',sub:null},{title:'TOP ALBUMS',items:curTops.albums.slice(0,5),nameKey:'name',sub:'artist'}].map(col=>(
          <div key={col.title} style={{border:`2px solid ${t.b}`,background:t.sf,padding:16,boxShadow:t.sh}}>
            <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu,marginBottom:12}}>{col.title}</div>
            {col.items.length===0&&<div style={{fontSize:11,color:t.mu}}>Loading...</div>}
            {col.items.map((item,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <span style={{fontSize:11,fontWeight:900,color:t.mu,minWidth:16}}>#{i+1}</span>
                {item.image&&<img src={item.image} alt="" style={{width:32,height:32,objectFit:'cover',border:`1px solid ${t.b}`,flexShrink:0}} onError={e=>e.target.style.display='none'}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item[col.nameKey]}</div>
                  {col.sub&&<div style={{fontSize:10,color:t.mu}}>{item[col.sub]}</div>}
                </div>
                <span style={{fontSize:10,color:t.mu,flexShrink:0}}>{fmtN(item.plays)}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
    </>)}

    {subView==='tracks'  &&<TopList items={curTops.tracks}  cols={['name','artist','plays']} t={t}/>}
    {subView==='artists' &&<TopList items={curTops.artists} cols={['name','plays']}          t={t}/>}
    {subView==='albums'  &&<TopList items={curTops.albums}  cols={['name','artist','plays']} t={t}/>}

    {subView==='scrobbles'&&(
      <div style={{border:`2px solid ${t.b}`,background:t.sf,boxShadow:t.sh}}>
        <div style={{borderBottom:`2px solid ${t.b}`,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu}}>90-DAY SCROBBLES</span>
          <span style={{fontSize:10,color:t.mu,fontWeight:700}}>{recent.length} TOTAL</span>
        </div>
        {recent.length===0&&<Empty t={t} msg="NO SCROBBLES LOADED"/>}
        {recent.slice(0,200).map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 16px',borderBottom:`1px solid ${t.b}`,transition:'background .1s'}}
            onMouseEnter={e=>e.currentTarget.style.background=t.ab}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            {s.image&&<img src={s.image} alt="" style={{width:42,height:42,objectFit:'cover',border:`1px solid ${t.b}`,flexShrink:0}} onError={e=>e.target.style.display='none'}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.title}</div>
              <div style={{fontSize:11,color:t.mu,marginTop:1}}>{s.artist}{s.album&&s.album!=='Unknown'?` — ${s.album}`:''}</div>
            </div>
            <span style={{fontSize:11,color:t.mu,fontWeight:700,flexShrink:0}}>{s.ts?fmtTs(s.ts):''}</span>
          </div>
        ))}
        {recent.length>200&&<div style={{padding:'12px 16px',fontSize:11,color:t.mu,textAlign:'center',borderTop:`1px solid ${t.b}`}}>Showing 200 of {recent.length} scrobbles</div>}
      </div>
    )}
  </>);
}

function TopList({items,cols,t}){
  if(!items?.length)return<Empty t={t} msg="NO DATA — TRY ANOTHER PERIOD"/>;
  return(
    <div style={{border:`2px solid ${t.b}`,background:t.sf,boxShadow:t.sh}}>
      {items.map((item,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 16px',borderBottom:`1px solid ${t.b}`,transition:'background .1s'}}
          onMouseEnter={e=>e.currentTarget.style.background=t.ab}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{color:t.mu,fontSize:11,fontWeight:700,minWidth:28,textAlign:'right'}}>{String(i+1).padStart(2,'0')}</span>
          {item.image&&<img src={item.image} alt="" style={{width:40,height:40,objectFit:'cover',border:`1px solid ${t.b}`,flexShrink:0}} onError={e=>e.target.style.display='none'}/>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.name}</div>
            {cols.includes('artist')&&item.artist&&<div style={{fontSize:11,color:t.mu,marginTop:2}}>{item.artist}</div>}
          </div>
          {cols.includes('plays')&&<span style={{fontSize:12,fontWeight:900,color:t.mu,flexShrink:0}}>{fmtN(item.plays)} plays</span>}
        </div>
      ))}
    </div>
  );
}

// ── Shared UI ─────────────────────────────────────────────────────────────────
function SongRow({song,t,index}){
  const p=PLATFORMS[song.platform];
  return(
    <div style={{display:'flex',alignItems:'center',gap:14,borderBottom:`1px solid ${t.b}`,padding:'12px 4px',transition:'background .1s'}}
      onMouseEnter={e=>e.currentTarget.style.background=t.ab}
      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
      <span style={{color:t.mu,fontSize:11,fontWeight:700,minWidth:28,textAlign:'right'}}>{String(index+1).padStart(2,'0')}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{song.title}</div>
        <div style={{color:t.mu,fontSize:11,marginTop:2}}>{song.artist} — {song.album}</div>
      </div>
      <span style={{border:`1px solid ${t.b}`,color:t.mu,fontSize:10,fontWeight:700,letterSpacing:1,padding:'2px 7px',textTransform:'uppercase',flexShrink:0}}>{song.genre}</span>
      <span style={{fontSize:10,fontWeight:900,letterSpacing:1,color:p.color,border:`2px solid ${p.color}`,padding:'2px 6px',flexShrink:0}}>{p.short}</span>
      <span style={{color:t.mu,fontSize:12,fontWeight:700,minWidth:42,textAlign:'right'}}>{song.plays?`${song.plays}×`:song.duration}</span>
    </div>
  );
}

function GroupSection({title,songs,t}){
  const [open,setOpen]=useState(true);
  return(
    <div style={{marginBottom:4}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 4px',borderBottom:`2px solid ${t.bs}`,cursor:'pointer',userSelect:'none'}}>
        <span style={{fontWeight:900,fontSize:13,letterSpacing:2,textTransform:'uppercase'}}>{title}</span>
        <span style={{color:t.mu,fontSize:10,fontWeight:700,marginLeft:'auto',letterSpacing:1}}>{songs.length} TRK</span>
        <span style={{color:t.mu,fontSize:12}}>{open?'▲':'▼'}</span>
      </div>
      {open&&songs.map((s,i)=><SongRow key={s.id} song={s} t={t} index={i}/>)}
    </div>
  );
}

function Empty({t,msg}){
  return<div style={{border:`2px solid ${t.b}`,padding:'40px 0',textAlign:'center',color:t.mu,letterSpacing:2,fontSize:12}}>{msg||'NO RESULTS'}</div>;
}

// ── Connect Modal ─────────────────────────────────────────────────────────────
function ConnectModal({onClose,t,dark,creds,setCreds,onOAuth,onLastfm}){
  const [tab,setTab]         = useState('lastfm');
  const [local,setLocal]     = useState({...creds});
  const [lfmUser,setLfmUser] = useState(getSaved('mulib_lfmuser','')||'');
  const [secret,setSecret]   = useState(getSaved('mulib_soundcloud_secret','')||'');
  const [busy,setBusy]       = useState(false);
  const [msg,setMsg]         = useState('');
  const ru=redirectUri();
  const inp={width:'100%',boxSizing:'border-box',background:t.ib,border:`2px solid ${t.b}`,padding:'10px 12px',color:t.tx,fontSize:12,fontFamily:'inherit',outline:'none',marginBottom:8};
  const lbl={display:'block',fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu,marginBottom:6,marginTop:12};
  const DOCS={
    spotify:    {note:'Create app → set Redirect URI → copy Client ID. PKCE — no secret needed.',              url:'https://developer.spotify.com/dashboard'},
    youtube:    {note:'New project → YouTube Data API v3 → OAuth 2.0 Client ID (Web). PKCE — no secret needed.',url:'https://console.cloud.google.com'},
    soundcloud: {note:'Register app → set Redirect URI. Requires both Client ID and Client Secret.',           url:'https://developers.soundcloud.com'},
    tidal:      {note:'Create app → set Redirect URI. PKCE — no secret needed.',                              url:'https://developer.tidal.com'},
    lastfm:     {note:'Create API account → copy API Key + enter username. No redirect needed.',              url:'https://www.last.fm/api/account/create'},
  };
  function save(platform,val){const n={...local,[platform]:val};setLocal(n);setCreds(n);setSaved('mulib_creds',n);}
  async function connect(){
    const clientId=local[tab];
    if(!clientId){setMsg('Enter a Client ID first.');return;}
    if(tab==='soundcloud'){setSaved('mulib_soundcloud_secret',secret);sessionStorage.setItem('mulib_soundcloud_secret',secret);}
    if(tab==='lastfm'){
      if(!lfmUser){setMsg('Enter your Last.fm username.');return;}
      setSaved('mulib_lfmuser',lfmUser);
      setBusy(true);setMsg('');
      await onLastfm(clientId,lfmUser);
      setBusy(false);onClose();return;
    }
    setBusy(true);
    await onOAuth(tab,clientId);
  }
  return(
    <div style={{position:'fixed',inset:0,background:dark?'#000c':'#0006',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:t.sf,border:`3px solid ${t.bs}`,boxShadow:`8px 8px 0 ${t.bs}`,width:'100%',maxWidth:540,maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 20px',borderBottom:`2px solid ${t.bs}`}}>
          <span style={{fontWeight:900,letterSpacing:3,fontSize:13,textTransform:'uppercase'}}>CONNECT PLATFORMS</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:t.mu,fontSize:20,cursor:'pointer',fontFamily:'inherit'}}>✕</button>
        </div>
        <div style={{padding:'10px 20px',borderBottom:`1px solid ${t.b}`,background:t.ab}}>
          <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:t.mu,marginBottom:4}}>REDIRECT URI — register this in each developer console:</div>
          <div style={{padding:'6px 10px',border:`1px solid ${t.b}`,fontFamily:'monospace',fontSize:11,color:t.tx,wordBreak:'break-all',background:t.ib}}>{ru}</div>
        </div>
        <div style={{display:'flex',borderBottom:`2px solid ${t.b}`,overflowX:'auto'}}>
          {Object.entries(PLATFORMS).filter(([k])=>k!=='scrobble').map(([key,p])=>(
            <button key={key} onClick={()=>{setTab(key);setMsg('');}} style={{flex:1,minWidth:50,background:tab===key?t.ab:'transparent',border:'none',borderBottom:tab===key?`3px solid ${p.color}`:'3px solid transparent',color:tab===key?t.tx:t.mu,fontWeight:700,fontSize:9,letterSpacing:.5,padding:'12px 4px',cursor:'pointer',fontFamily:'inherit',textTransform:'uppercase'}}>{p.short}</button>
          ))}
        </div>
        <div style={{padding:20}}>
          <div style={{marginBottom:12,padding:'10px 12px',border:`1px solid ${t.b}`,background:t.ab,fontSize:11,color:t.mu,lineHeight:1.7}}>
            {DOCS[tab].note}
            <div style={{marginTop:4}}><a href={DOCS[tab].url} target="_blank" rel="noreferrer" style={{color:PLATFORMS[tab].color,fontWeight:700,fontSize:11,letterSpacing:1}}>GET CREDENTIALS →</a></div>
          </div>
          <label style={lbl}>{tab==='lastfm'?'API KEY':'CLIENT ID'}</label>
          <input style={inp} value={local[tab]||''} onChange={e=>save(tab,e.target.value)} placeholder={`${PLATFORMS[tab].name.toUpperCase()} ${tab==='lastfm'?'API KEY':'CLIENT ID'}`}/>
          {tab==='soundcloud'&&(<><label style={lbl}>CLIENT SECRET</label><input style={inp} value={secret} onChange={e=>setSecret(e.target.value)} placeholder="SOUNDCLOUD CLIENT SECRET" type="password"/></>)}
          {tab==='lastfm'&&(<><label style={lbl}>USERNAME</label><input style={inp} value={lfmUser} onChange={e=>setLfmUser(e.target.value)} placeholder="YOUR LAST.FM USERNAME"/></>)}
          <button onClick={connect} disabled={busy} style={{width:'100%',marginTop:8,background:PLATFORMS[tab].color,border:`2px solid ${PLATFORMS[tab].color}`,color:'#fff',fontWeight:900,fontSize:12,letterSpacing:2,padding:'12px 0',cursor:busy?'wait':'pointer',fontFamily:'inherit',opacity:busy?.7:1,boxShadow:`4px 4px 0 ${dark?'#000':'#333'}`}}>
            {busy?'CONNECTING...':`CONNECT ${PLATFORMS[tab].name.toUpperCase()}`}
          </button>
          {tab!=='lastfm'&&<p style={{marginTop:10,fontSize:10,color:t.mu,lineHeight:1.7}}>You will be redirected to {PLATFORMS[tab].name} to authorise, then returned here automatically.</p>}
          {msg&&<div style={{marginTop:12,padding:'10px 12px',border:`1px solid #ef4444`,fontSize:12,fontWeight:700,color:'#ef4444'}}>{msg}</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
